<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>G-Switch Online</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main>
      <header>
        <div><p class="eyebrow">原版多人赛道 · 中文联机复刻</p><h1>重力小子：联机版</h1></div>
        <div class="status"><span id="dot"></span><span id="status">未连接</span><small id="ping">— ms</small><small id="diagnostics" title="状态包间隔：平均/P95/最大；随后为服务器 tick 跳号与浏览器渲染帧率">诊断待连接</small></div>
      </header>
      <section class="game-shell" aria-label="多人赛道">
        <canvas id="game" width="640" height="501" aria-label="G-Switch multiplayer course"></canvas>
        <div id="front-screen" data-phase="loading">
          <div id="loading-panel"><span>正在加载</span><i></i></div>
          <div id="menu-panel">
            <div class="menu-title-mask"><strong>重力小子</strong><span>联机版</span></div>
            <p>最多 4 人 · 房主开始比赛后，点击或按 <kbd>空格</kbd> 反转重力</p>
            <label>房间码 <input id="room" maxlength="12" value="RUN4" autocomplete="off"></label>
            <label>昵称 <input id="nickname" maxlength="12" value="玩家" autocomplete="nickname"></label>
            <button id="menu-start" disabled>加载赛道资源…</button>
          </div>
          <div id="lobby-panel" aria-live="polite">
            <div class="lobby-card">
              <span class="lobby-kicker">等待大厅</span>
              <strong>房间 <span id="lobby-room">—</span></strong>
              <p id="lobby-hint">正在同步房间成员…</p>
              <div id="lobby-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><span id="lobby-progress-label">赛道资源 0%</span><i><b id="lobby-progress-bar"></b></i></div>
              <ol id="lobby-players"></ol>
              <button id="lobby-start" disabled>房主开始比赛</button>
            </div>
          </div>
        </div>
        <div id="overlay" hidden><strong>正在加入房间</strong><span>正在建立联机连接…</span></div>
        <div id="end-screen" hidden>
          <div class="end-copy"><strong>本局结束</strong><span id="end-result">已完成全程</span><button id="back-menu">返回主菜单</button></div>
        </div>
      </section>
      <section class="controls">
        <button id="flip" disabled>反转重力 <kbd>Space</kbd></button>
        <button id="sound-toggle" type="button" aria-pressed="false">音乐：关</button>
        <span id="course-status">赛道：MP02 → MP03 → MP04</span>
        <span id="players">等待玩家</span>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
